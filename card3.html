<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 390px; height: 390px; background: #0a0a0a; overflow: hidden; }
.card {
  width: 390px; height: 390px;
  background: #0a0a0a;
  display: flex; flex-direction: column;
  align-items: flex-start; justify-content: center;
  padding: 32px; position: relative; overflow: hidden;
}
.line { width: 20px; height: 2px; background: #fff; margin-bottom: 16px; }
.title { font-size: 24px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 20px; font-family: 'Georgia', serif; }
.row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
.label {
  font-size: 11px; font-weight: 700; font-family: Arial, sans-serif;
  padding: 3px 8px; border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.label-anxiety { background: #2a1f3d; color: #a78bfa; }
.label-dep { background: #1a2a1a; color: #6ee7b7; }
.desc { font-size: 13px; color: #aaaaaa; line-height: 1.6; font-family: Arial, sans-serif; }
.desc span { color: #ffffff; font-weight: 500; }
.footer {
  font-size: 10px; color: #444; font-family: Arial, sans-serif;
  letter-spacing: 0.5px; text-transform: uppercase;
  position: absolute; bottom: 24px; left: 32px; right: 32px;
  display: flex; justify-content: space-between; align-items: center;
}
.handle { color: #fff; font-weight: 600; }
.corner {
  position: absolute; top: 20px; right: 20px; width: 28px; height: 28px;
  border-top: 1.5px solid #222; border-right: 1.5px solid #222;
}
</style>
</head>
<body>
<div class="card">
  <div class="corner"></div>
  <div class="line"></div>
  <div class="title">Тревога или<br>депрессия?</div>
  <div class="row">
    <div class="label label-anxiety">Тревога</div>
    <div class="desc">Мозг кричит <span>«опасность!»</span><br>Мысли по кругу. Не остановить.</div>
  </div>
  <div class="row">
    <div class="label label-dep">Депрессия</div>
    <div class="desc">Мозг <span>замолчал.</span><br>Пустота. Ничего не хочется.</div>
  </div>
  <div class="desc" style="margin-top:14px;font-size:12px;color:#666">
    Они часто приходят <span style="color:#fff">вместе.</span>
  </div>
  <div class="footer">
    <span>Проверь себя — ссылка в профиле →</span>
    <span class="handle">@bez.fufla</span>
  </div>
</div>
</body>
</html>
