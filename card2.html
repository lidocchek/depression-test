<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 390px;
  height: 390px;
  background: #0a0a0a;
  overflow: hidden;
}
.card {
  width: 390px;
  height: 390px;
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  padding: 32px;
  position: relative;
  overflow: hidden;
}
.line { width: 20px; height: 2px; background: #fff; margin-bottom: 16px; }
.question {
  font-size: 30px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 14px;
  font-family: 'Georgia', serif;
}
.question span { color: #666; }
.body {
  font-size: 13px;
  color: #999;
  line-height: 1.75;
  font-family: Arial, sans-serif;
  font-weight: 300;
}
.highlight { color: #fff; font-weight: 500; }
.footer {
  font-size: 10px;
  color: #444;
  font-family: Arial, sans-serif;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  position: absolute;
  bottom: 24px;
  left: 32px;
  right: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.handle { color: #fff; font-weight: 600; }
.corner {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 28px;
  height: 28px;
  border-top: 1.5px solid #222;
  border-right: 1.5px solid #222;
}
</style>
</head>
<body>
<div class="card">
  <div class="corner"></div>
  <div class="line"></div>
  <div class="question">А что если<br>ты <span>не</span><br>ленивый?</div>
  <div class="body">
    Пьёшь. Куришь. Скроллишь ленту часами.<br>
    Сериалы нон-стоп. Не можешь<br>
    <span class="highlight">заставить себя делать простые вещи.</span><br><br>
    А тебе просто нужна помощь.
  </div>
  <div class="footer">
    <span>Знать — это уже половина пути →</span>
    <span class="handle">@bez.fufla</span>
  </div>
</div>
</body>
</html>
